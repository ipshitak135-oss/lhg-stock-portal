<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LHG Admin Login</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="login-box">

    <h1>LHG Admin Portal</h1>

    <p>Authorized Personnel Only</p>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button id="loginBtn">
        Login
    </button>

    <p id="error"></p>

</div>

<script src="admin.js"></script>

</body>

</html>
